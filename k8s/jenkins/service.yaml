apiVersion: v1
kind: Service
metadata:
  name: jenkins-service
  namespace: codesync
spec:
  selector:
    app: jenkins
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
    - name: app
      protocol: TCP
      port: 4567
      targetPort: 4567
      nodePort: 30456
  type: NodePort
