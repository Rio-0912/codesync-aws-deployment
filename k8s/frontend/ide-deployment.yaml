apiVersion: apps/v1
kind: Deployment
metadata:
  name: ide-deployment
  namespace: codesync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ide
  template:
    metadata:
      labels:
        app: ide
    spec:
      nodeSelector:
        role: frontend
      containers:
        - name: ide
          image: codesync-ide:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config
          configMap:
            name: ide-config
