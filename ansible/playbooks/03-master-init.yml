- hosts: control
  become: yes
  tasks:
    - name: Check if cluster is already initialized
      stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_conf

    - name: Initialize Kubernetes cluster
      command: kubeadm init --pod-network-cidr=10.244.0.0/16 --apiserver-advertise-address=10.0.1.10
      when: not kubeadm_conf.stat.exists

    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: 0755

    - name: Copy admin.conf to user's kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        owner: ubuntu
        group: ubuntu
        mode: 0600
        remote_src: yes

    - name: Apply Flannel CNI
      become: no
      command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      when: not kubeadm_conf.stat.exists

    - name: Generate join command
      command: kubeadm token create --print-join-command
      register: join_command_raw

    - name: Save join command to local file
      local_action: copy content="{{ join_command_raw.stdout_lines[0] }}" dest="join-command.txt"
      become: no
