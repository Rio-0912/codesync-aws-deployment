- hosts: control
  become: yes
  tasks:
    - name: Generate SSH key for Jenkins if not exists
      user:
        name: ubuntu
        generate_ssh_key: yes
        ssh_key_bits: 2048
        ssh_key_file: .ssh/id_rsa

    - name: Fetch public key from control node
      fetch:
        src: /home/ubuntu/.ssh/id_rsa.pub
        dest: /tmp/jenkins_id_rsa.pub
        flat: yes

- hosts: frontend
  become: yes
  tasks:
    - name: Add Jenkins public key to authorized_keys on frontend
      authorized_key:
        user: ubuntu
        state: present
        key: "{{ lookup('file', '/tmp/jenkins_id_rsa.pub') }}"
